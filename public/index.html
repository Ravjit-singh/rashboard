<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rashboard Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a premium feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col font-sans selection:bg-blue-500 selection:text-white">
    
    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-wider text-slate-100">RASHBOARD <span class="text-blue-500 font-mono text-sm ml-2">v2.0</span></h1>
        </div>
        <div class="text-xs font-mono text-slate-500" id="connection-status">Connecting to Core...</div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4" id="chat-box">
        <div class="bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl max-w-[85%] self-start shadow-sm backdrop-blur-sm">
            <p class="text-sm">System initialized. I am monitoring your deployment telemetry. What would you like to check?</p>
        </div>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 p-4">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <input 
                type="text" 
                id="message-input" 
                class="flex-1 bg-slate-950 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition-all placeholder-slate-500" 
                placeholder="Ask about Skillmax or RChat status..." 
                required
            >
            <button 
                type="submit" 
                class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-800 font-medium rounded-lg text-sm px-5 py-3 text-center transition-all flex items-center justify-center min-w-[100px]"
                id="send-btn"
            >
                Execute
            </button>
        </form>
    </footer>

    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('connection-status');

        // Check backend connection on load
        fetch('http://localhost:3000/api/health')
            .then(res => res.json())
            .then(data => {
                statusText.textContent = "Core Online";
                statusText.classList.replace('text-slate-500', 'text-green-400');
            })
            .catch(err => {
                statusText.textContent = "Core Offline";
                statusText.classList.replace('text-slate-500', 'text-red-400');
            });

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-xl max-w-[85%] text-sm shadow-sm backdrop-blur-sm ${
                isUser 
                ? 'bg-blue-600 text-white self-end rounded-br-none' 
                : 'bg-slate-800/50 border border-slate-700/50 self-start rounded-bl-none text-slate-200'
            }`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            // UI Updates
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.textContent = 'Processing...';
            sendBtn.disabled = true;

            try {
                // Call the Node.js Agent
                const response = await fetch('http://localhost:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                addMessage(data.response);
                
            } catch (error) {
                addMessage("System Error: Failed to connect to Rashboard Core.");
            } finally {
                sendBtn.textContent = 'Execute';
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
