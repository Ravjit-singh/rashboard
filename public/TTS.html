<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Matrix | Rashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: system-ui, -apple-system, sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 selection:bg-white selection:text-black">
    
    <div class="max-w-xl w-full bg-[#09090b] border border-white/10 rounded-[24px] p-6 md:p-8 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)] relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-b-full"></div>
        
        <h1 class="text-2xl font-bold tracking-tight mb-2">Agent Audio Config</h1>
        <p class="text-sm text-gray-400 mb-6 font-medium leading-relaxed">Select a local system voice for the Rashboard AI agent. Note: Voices are loaded asynchronously by the browser, so the list may take a second to populate.</p>
        
        <div class="flex flex-col gap-5">
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Select System Voice</label>
                <select id="voice-select" class="w-full bg-[#18181b] border border-white/10 rounded-xl px-4 py-3.5 text-sm outline-none focus:border-white/30 transition-colors shadow-[inset_0_2px_4px_0_rgba(0,0,0,0.2)] appearance-none cursor-pointer">
                    <option value="">Fetching system voices...</option>
                </select>
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Test Protocol</label>
                <textarea id="test-text" rows="2" class="w-full bg-[#18181b] border border-white/10 rounded-xl px-4 py-3.5 text-sm outline-none focus:border-white/30 transition-colors resize-none shadow-[inset_0_2px_4px_0_rgba(0,0,0,0.2)] leading-relaxed">System initialized. Your environments are currently synced and secure.</textarea>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-1">
                <div class="bg-[#18181b] border border-white/10 rounded-xl p-4 shadow-[inset_0_2px_4px_0_rgba(0,0,0,0.2)]">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Rate</label>
                        <span id="rate-val" class="text-xs font-mono font-bold">1.05</span>
                    </div>
                    <input type="range" id="rate-slider" min="0.5" max="2" value="1.05" step="0.05" class="w-full accent-white cursor-pointer">
                </div>
                
                <div class="bg-[#18181b] border border-white/10 rounded-xl p-4 shadow-[inset_0_2px_4px_0_rgba(0,0,0,0.2)]">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Pitch</label>
                        <span id="pitch-val" class="text-xs font-mono font-bold">1.0</span>
                    </div>
                    <input type="range" id="pitch-slider" min="0" max="2" value="1.0" step="0.1" class="w-full accent-white cursor-pointer">
                </div>
            </div>

            <button id="play-btn" class="w-full bg-white text-black font-bold py-4 rounded-xl mt-2 active:scale-[0.98] transition-transform shadow-[0_4px_14px_rgba(255,255,255,0.15)] flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Execute Audio Test
            </button>
            
            <div id="selected-name" class="text-center text-[11px] text-gray-500 mt-1 font-mono tracking-tight bg-white/5 py-2 rounded-lg border border-white/5 hidden"></div>
        </div>
    </div>

    <script>
        const voiceSelect = document.getElementById('voice-select');
        const playBtn = document.getElementById('play-btn');
        const testText = document.getElementById('test-text');
        const rateSlider = document.getElementById('rate-slider');
        const pitchSlider = document.getElementById('pitch-slider');
        const rateVal = document.getElementById('rate-val');
        const pitchVal = document.getElementById('pitch-val');
        const selectedName = document.getElementById('selected-name');
        
        let voices = [];

        function populateVoiceList() {
            // Browsers load this array asynchronously, so we wrap it in a function
            voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;

            voiceSelect.innerHTML = '';
            
            // Prioritize English voices at the top
            voices.sort((a, b) => {
                if (a.lang.startsWith('en') && !b.lang.startsWith('en')) return -1;
                if (!a.lang.startsWith('en') && b.lang.startsWith('en')) return 1;
                return a.name.localeCompare(b.name);
            });

            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} [${voice.lang}]`;
                option.value = index;
                voiceSelect.appendChild(option);
            });
            
            // Attempt to auto-select a recognizable male voice if one is installed
            const defaultMaleIndex = voices.findIndex(v => 
                (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('guy') || v.name.toLowerCase().includes('david')) 
                && v.lang.startsWith('en')
            );
            
            if (defaultMaleIndex !== -1) {
                voiceSelect.value = defaultMaleIndex;
            }
        }

        // Trigger immediately, and also listen for the async load event
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // Real-time slider updates
        rateSlider.addEventListener('input', e => rateVal.textContent = parseFloat(e.target.value).toFixed(2));
        pitchSlider.addEventListener('input', e => pitchVal.textContent = parseFloat(e.target.value).toFixed(1));

        playBtn.addEventListener('click', () => {
            if (voices.length === 0) return alert("System voices are still booting. Please wait a moment.");
            
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(testText.value);
            const selectedVoice = voices[voiceSelect.value];
            
            utterance.voice = selectedVoice;
            utterance.rate = parseFloat(rateSlider.value);
            utterance.pitch = parseFloat(pitchSlider.value);
            
            selectedName.textContent = `Target Variable: "${selectedVoice.name}"`;
            selectedName.classList.remove('hidden');
            
            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
